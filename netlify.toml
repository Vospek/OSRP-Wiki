[build]
  # 优先使用 pnpm 进行构建，并清除可能导致旧文档残留的 Docusaurus 缓存
  command = "corepack enable pnpm && pnpm install --frozen-lockfile && pnpm clear && pnpm build"
  publish = "build"

[build.environment]
  # Docusaurus 3.x 需要 Node.js 18.0 或更高版本，这里固定为较新的长期支持版 20
  NODE_VERSION = "24"


# 自定义 404 页面回退，指向 Docusaurus 默认构建出的 404.html
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
